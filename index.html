<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>La odisea de Odiseo</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#faf5e8;overscroll-behavior:none;touch-action:none;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;touch-action:none}
  .doodle-btn{-webkit-user-select:none;user-select:none;touch-action:manipulation}
  .doodle-btn{
    position:fixed;left:50%;top:60%;transform:translate(-50%,-50%) rotate(-2deg);
    font-family:"Chalkboard SE","Comic Sans MS",cursive;font-size:32px;font-weight:700;
    color:#3a352e;background:#fffdf4;padding:12px 40px;cursor:pointer;
    border:3px solid #3a352e;border-radius:18px 22px 16px 24px/22px 16px 24px 18px;
    box-shadow:3px 4px 0 rgba(58,53,46,.25);letter-spacing:3px;outline:none;
  }
  .doodle-btn:hover{transform:translate(-50%,-50%) rotate(1.5deg) scale(1.06)}
  .doodle-btn:active{transform:translate(-50%,-50%) scale(.96)}
  #shotBtn{display:none;font-size:32px;padding:7px 22px;top:74%;left:53%}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<button id="startBtn" class="doodle-btn">EMPEZAR</button>
<button id="shotBtn" class="doodle-btn">&#10515;</button>
<script src="game.js?v=39"></script>
</body>
</html>
